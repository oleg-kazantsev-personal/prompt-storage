services:
  sqlserver-dev:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver-init
    depends_on:
      sqlserver-dev:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      PROMPT_DB_PASSWORD: "${PROMPT_DB_PASSWORD}"
    volumes:
      - ./db-init:/db-init:ro
    entrypoint:
      - /bin/bash
      - -c
      - >
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver-dev
        -U sa
        -P "$$MSSQL_SA_PASSWORD"
        -C
        -v PROMPT_DB_PASSWORD="$$PROMPT_DB_PASSWORD"
        -i /db-init/init.sql
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptstorage-api
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
    ports:
      - "5064:5064"
      - "7244:7244"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__PromptStorageDb: "Server=sqlserver-dev,1433;Database=PromptStorageDb;User Id=prompt_app;Password=${PROMPT_DB_PASSWORD};TrustServerCertificate=True;"
    restart: unless-stopped

volumes:
  sql_data: